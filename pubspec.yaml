name: shopnexus_flutter_app
description: "Cross-platform application for Shopnexus."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  retrofit: ^4.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^13.2.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.8.1

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  web_socket_channel: ^2.4.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.8
  freezed: ^3.0.0
  json_serializable: ^6.7.1
  retrofit_generator: 10.2.1
  riverpod_generator: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_shopnexus.jpg

dependency_overrides:
  meta: ^1.18.0